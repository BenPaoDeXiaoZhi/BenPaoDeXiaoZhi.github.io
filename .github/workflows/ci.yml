name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Type Check
        run: npm run check

  preview:
    name: Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Preview
        run: npm run preview &
        env:
          NODE_ENV: production

      - name: Wait for preview
        run: npx wait-on http://localhost:4173 --timeout 30000 || true

      - name: Verify preview
        run: curl -s -o /dev/null -w "%{http_code}" http://localhost:4173 | grep -q "200" && echo "Preview server is running" || echo "Preview server failed to start"
